<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evalytics Function Docs</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="./taskpane.css" />
  </head>
  <body>
    <main class="pane">
      <header class="hero">
        <div>
          <p class="eyebrow">Evalytics</p>
          <h1 data-i18n="title">Function Docs</h1>
          <p class="subtitle" data-i18n="subtitle">Searchable documentation for Evalytics worksheet functions.</p>
          <p class="build-stamp" id="build-stamp">Build __BUILD_STAMP__</p>
        </div>
        <div class="language-switch" aria-label="Language">
          <button type="button" data-lang="cs">CZ</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </header>

      <section class="search-card">
        <label for="search" data-i18n="searchLabel">Search functions</label>
        <input id="search" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" />
        <p class="hint" data-i18n="hint">Tip: formulas use the EVALYTICS namespace in Excel.</p>
      </section>

      <section class="status" id="status" role="status"></section>
      <details class="debug-panel" open>
        <summary>Dev log</summary>
        <div class="debug-actions">
          <button id="copy-debug-log" class="debug-copy-button" type="button" data-i18n="copyLog">Copy log</button>
        </div>
        <pre id="debug-log"></pre>
      </details>
      <section class="function-list" id="function-list" aria-live="polite"></section>
    </main>

    <template id="function-card-template">
      <article class="function-card">
        <button class="function-header" type="button">
          <span class="function-name"></span>
          <span class="function-category"></span>
        </button>
        <div class="function-body">
          <p class="description"></p>
          <p class="formula-label"></p>
          <pre class="signature"></pre>
          <div class="parameters"></div>
          <div class="outputs"></div>
          <div class="actions">
            <button class="copy-button" type="button" data-i18n-copy>Copy formula</button>
          </div>
        </div>
      </article>
    </template>

    <script>window.EVALYTICS_BUILD_STAMP = "__BUILD_STAMP__";</script>
    <script src="./taskpane.js"></script>
  </body>
</html>
